<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Order</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Cravings Spot</h1>
        <p>Order your favourite food in one place!</p>
    </header>

    <div class="container">

        <h2>Food Menu</h2>

        <div class="menu">

            <div class="card">
                <h3>Burger</h3>
                <p>₹120</p>
                <input type="checkbox" id="burger">
                Qty:
                <input type="number" id="burgerQty" min="1" value="1">
            </div>

            <div class="card">
                <h3>Pizza</h3>
                <p>₹250</p>
                <input type="checkbox" id="pizza">
                Qty:
                <input type="number" id="pizzaQty" min="1" value="1">
            </div>

            <div class="card">
                <h3>Sandwich</h3>
                <p>₹90</p>
                <input type="checkbox" id="sandwich">
                Qty:
                <input type="number" id="sandwichQty" min="1" value="1">
            </div>

            <div class="card">
                <h3>Fries</h3>
                <p>₹80</p>
                <input type="checkbox" id="fries">
                Qty:
                <input type="number" id="friesQty" min="1" value="1">
            </div>

            <div class="card">
                <h3>Juice</h3>
                <p>₹60</p>
                <input type="checkbox" id="juice">
                Qty:
                <input type="number" id="juiceQty" min="1" value="1">
            </div>

        </div>

        <h2>Customer Details</h2>

        <form>

            <label>Name</label>
            <input type="text" id="name">

            <label>Mobile Number</label>
            <input type="text" id="mobile">

            <label>Address</label>
            <textarea id="address"></textarea>

        </form>

        <button onclick="calculateBill()">Place Order</button>

        <h2>Order Summary</h2>

        <pre id="summary"></pre>

    </div>

<script src="script.js"></script>

</body>
</html>
